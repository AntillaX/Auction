# /etc/nginx/sites-available/vv
# Replaces the previous "platform" site and routes the landing hub,
# the Godot Platform web export, and the Auction Node server.

server {
    listen 80;
    server_name _;
    root /var/www/vv;

    # Inherit mime.types from nginx.conf's http{} block. We deliberately
    # do NOT declare a server-level `types {}` block here: in nginx, a
    # `types` directive REPLACES the inherited map instead of extending
    # it, which would leave index.html with no recognized Content-Type
    # and trigger a browser download. Godot's .pck files fall back to
    # the http-level `default_type application/octet-stream`, which is
    # exactly what Godot expects.

    # ─── Landing hub ────────────────────────────────────────────────
    location = / {
        try_files /index.html =404;
    }

    # ─── Platform — Godot web export ────────────────────────────────
    # Godot 4 threaded exports require cross-origin isolation
    # (SharedArrayBuffer), so we keep the COOP/COEP headers the
    # previous site had, now scoped to /platform/ only.
    #
    # A small wrapper `index.html` (deployed from deploy/platform-wrapper/)
    # iframes Godot's Platform_WebClaude.html and overlays a "Hub" link,
    # letting us add chrome without touching any exported Godot files.
    # Because the wrapper and the iframe are same-origin, the COOP/COEP
    # headers apply to both and SharedArrayBuffer still works.
    location /platform/ {
        index index.html;
        try_files $uri $uri/ =404;
        add_header Cross-Origin-Opener-Policy same-origin;
        add_header Cross-Origin-Embedder-Policy require-corp;
    }

    # ─── Platform WebSocket relay (unchanged) ───────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ─── Auction — Node.js + WebSocket ──────────────────────────────
    # Trailing slash on proxy_pass strips the /auction/ prefix, so the
    # node server sees requests at its own root (/, /app.js, /style.css,
    # and the WS upgrade at /). The client computes its WS URL from
    # location.pathname so it naturally targets /auction/.
    location /auction/ {
        proxy_pass http://127.0.0.1:3100/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ─── Level 0 — Node.js + WebSocket ──────────────────────────────
    # Same proxy pattern as /auction/. Node service runs on 3200.
    location /level0/ {
        proxy_pass http://127.0.0.1:3200/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Any other path — no-op fallback; most requests are covered above
    location / {
        try_files $uri $uri/ =404;
    }
}
