# /etc/nginx/sites-available/vv
# Replaces the previous "platform" site and routes the landing hub,
# the Godot Platform web export, and the Auction Node server.

server {
    listen 80;
    server_name _;
    root /var/www/vv;

    # .pck isn't in the default mime.types — nothing else needs overriding
    # (wasm is already registered in /etc/nginx/mime.types)
    types {
        application/octet-stream pck;
    }

    # ─── Landing hub ────────────────────────────────────────────────
    location = / {
        try_files /index.html =404;
    }

    # ─── Platform — Godot web export ────────────────────────────────
    # Godot 4 threaded exports require cross-origin isolation
    # (SharedArrayBuffer), so we keep the COOP/COEP headers the
    # previous site had, now scoped to /platform/ only.
    #
    # Note: we deliberately skip `$uri/` in try_files. Platform's
    # directory index is Platform_WebClaude.html (not index.html),
    # so `$uri/` would cause nginx to return 403 for `/platform/`
    # instead of falling through to the explicit fallback.
    location /platform/ {
        try_files $uri /platform/Platform_WebClaude.html =404;
        add_header Cross-Origin-Opener-Policy same-origin;
        add_header Cross-Origin-Embedder-Policy require-corp;
    }

    # ─── Platform WebSocket relay (unchanged) ───────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ─── Auction — Node.js + WebSocket ──────────────────────────────
    # Trailing slash on proxy_pass strips the /auction/ prefix, so the
    # node server sees requests at its own root (/, /app.js, /style.css,
    # and the WS upgrade at /). The client computes its WS URL from
    # location.pathname so it naturally targets /auction/.
    location /auction/ {
        proxy_pass http://127.0.0.1:3100/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Any other path — no-op fallback; most requests are covered above
    location / {
        try_files $uri $uri/ =404;
    }
}
