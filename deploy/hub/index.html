<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLATFORMVV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg-surface: #141414;
      --text-primary: #e8e0d0;
      --text-secondary: #888;
      --text-dim: #555;
      --accent: #d4a843;
      --accent-glow: rgba(212, 168, 67, 0.3);
      --radius: 8px;
      --radius-lg: 12px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 70%);
      color: var(--text-primary);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .hub {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hub-title {
      font-size: 1.35rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      margin-bottom: 0.4rem;
      text-align: center;
    }

    .hub-subtitle {
      font-size: 0.78rem;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      margin-bottom: 1.75rem;
      text-align: center;
    }

    .tiles {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .tile {
      display: block;
      padding: 1rem 1.1rem 1.1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      text-decoration: none;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .tile:hover,
    .tile:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
      outline: none;
    }

    .tile-name {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      margin-bottom: 0.45rem;
      text-transform: uppercase;
      color: var(--accent);
    }

    .tile-desc {
      display: block;
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 0.75rem;
    }

    .tile-cta {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .tile-cta::after {
      content: " \2192";
      display: inline-block;
      transition: transform 0.18s ease;
    }

    .tile:hover .tile-cta::after,
    .tile:focus-visible .tile-cta::after { transform: translateX(4px); }

    footer {
      margin-top: 2rem;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @media (min-width: 480px) {
      .hub { max-width: 460px; }
      .hub-title { font-size: 1.5rem; }
      .hub-subtitle { font-size: 0.85rem; margin-bottom: 2rem; }
      .tiles { gap: 1.1rem; }
      .tile { padding: 1.2rem 1.25rem 1.35rem; }
      .tile-name { font-size: 1.2rem; }
      .tile-desc { font-size: 0.85rem; }
      .tile-cta { font-size: 0.72rem; }
    }
  </style>
</head>
<body>
  <main class="hub">
    <h1 class="hub-title">PLATFORMVV</h1>
    <p class="hub-subtitle">Multiplayer games &middot; pick your table</p>

    <div class="tiles">
      <a class="tile" href="/platform/">
        <span class="tile-name">Platform</span>
        <span class="tile-desc">A 4-player game of reads and bluffs.</span>
        <span class="tile-cta">Play Platform</span>
      </a>

      <a class="tile" href="/auction/">
        <span class="tile-name">Auction</span>
        <span class="tile-desc">Bid, bluff, and build the strongest squad of football legends. First to 655 points wins.</span>
        <span class="tile-cta">Play Auction</span>
      </a>
    </div>

    <footer>platformvv.com</footer>
  </main>
</body>
</html>
