<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>PLATFORMVV</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S648R7WPGJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S648R7WPGJ');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --text-primary: #e8e0d0;
      --text-secondary: #888;
      --text-dim: #555;
      --accent: #d4a843;
      --radius-lg: 12px;
    }

    html { background: #0a0a0a; }
    html, body { min-height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 70%);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .hub {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hub-title {
      font-size: 1.35rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      margin-bottom: 0.4rem;
      text-align: center;
    }

    .hub-subtitle {
      font-size: 0.78rem;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      margin-bottom: 1.75rem;
      text-align: center;
    }

    /* Horizontal scroll carousel on mobile, row on desktop */
    .tiles-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      padding: 0.25rem 1rem 0.5rem;
    }
    .tiles-wrap::-webkit-scrollbar { display: none; }

    .tiles {
      display: flex;
      flex-direction: row;
      gap: 0.9rem;
      width: max-content;
    }

    .tile {
      flex-shrink: 0;
      width: 70vw;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      padding: 1.4rem 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      text-decoration: none;
      scroll-snap-align: center;
      transition: border-color 0.18s ease, background 0.18s ease;
    }

    @media (hover: hover) {
      .tile:hover, .tile:focus-visible {
        border-color: var(--accent);
        background: rgba(255, 255, 255, 0.05);
        outline: none;
      }
    }

    .tile-inner { display: flex; flex-direction: column; align-items: center; }

    .tile-name {
      display: block;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
    }

    .tile-desc {
      display: block;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-top: 0.35rem;
      text-align: center;
    }

    .aside {
      margin-top: 1.5rem;
      text-align: center;
    }

    .aside-link {
      display: inline-block;
      padding: 0.45rem 0.9rem;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      transition: color 0.18s ease, border-color 0.18s ease;
    }
    .aside-link:hover, .aside-link:focus-visible {
      color: var(--accent);
      border-color: rgba(212, 168, 67, 0.4);
      outline: none;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @media (min-width: 480px) {
      .hub-title { font-size: 1.5rem; }
      .hub-subtitle { font-size: 0.85rem; margin-bottom: 2rem; }
      .tile-name { font-size: 1.25rem; }
      .tile { width: 60vw; }
    }

    @media (min-width: 640px) {
      .tile { width: 44vw; min-height: 130px; padding: 1.6rem 1.25rem; }
      .tile-name { font-size: 1.35rem; }
    }

    @media (min-width: 860px) {
      body { padding: 2rem; }
      .hub-title { font-size: 1.65rem; margin-bottom: 0.5rem; }
      .hub-subtitle { margin-bottom: 2.25rem; }
      .tiles-wrap { overflow: visible; padding: 0; width: 100%; }
      .tiles { width: 100%; gap: 1.5rem; }
      .tile { flex: 1 1 0; width: auto; scroll-snap-align: none; min-height: 140px; padding: 1.8rem 1.5rem; }
      .tile-name { font-size: 1.5rem; }
    }

    .acdc-slash { color: var(--text-dim); margin: 0 0.05em; }
  </style>
</head>
<body>
  <main class="hub">
    <h1 class="hub-title">PLATFORMVV</h1>
    <p class="hub-subtitle">Multiplayer games &middot; pick your table</p>

    <div class="tiles-wrap">
    <div class="tiles">
      <a class="tile" href="/platform/" data-game="platform">
        <div class="tile-inner">
          <span class="tile-name">Platform</span>
          <span class="tile-desc">4 players</span>
        </div>
      </a>

      <a class="tile" href="/auction/" data-game="auction">
        <div class="tile-inner">
          <span class="tile-name">Auction</span>
          <span class="tile-desc">4–5 players</span>
        </div>
      </a>

      <a class="tile" href="/acdc/" data-game="acdc">
        <div class="tile-inner">
          <span class="tile-name">AC<span class="acdc-slash">/</span>DC</span>
          <span class="tile-desc">2 players</span>
        </div>
      </a>

      <a class="tile" href="/doors/" data-game="doors">
        <div class="tile-inner">
          <span class="tile-name">Doors</span>
          <span class="tile-desc">4–5 players</span>
        </div>
      </a>
    </div>
    </div><!-- /.tiles-wrap -->

    <div class="aside">
      <a class="aside-link" href="/level0/" data-game="level0">Level 0</a>
    </div>

    <footer>platformvv.com</footer>
  </main>

  <script>
    document.querySelectorAll('.tile[data-game]').forEach((el) => {
      el.addEventListener('click', () => {
        if (typeof gtag === 'function') {
          gtag('event', 'hub_tile_click', { game: el.dataset.game });
        }
      });
    });
  </script>
</body>
</html>
