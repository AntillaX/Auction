<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>PLATFORMVV</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S648R7WPGJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S648R7WPGJ');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --text-primary: #e8e0d0;
      --text-secondary: #888;
      --text-dim: #555;
      --accent: #d4a843;
      --radius-lg: 12px;
    }

    html { background: #0a0a0a; }
    html, body { min-height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 70%);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 0;
      -webkit-font-smoothing: antialiased;
    }

    .hub {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hub-title {
      font-size: 1.35rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      margin-bottom: 0.4rem;
      text-align: center;
    }

    .hub-subtitle {
      font-size: 0.78rem;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      margin-bottom: 1.75rem;
      text-align: center;
    }

    /* Scrollable tile strip on small screens.
       On mobile: horizontal scroll carousel so the grid grows gracefully
       as more games are added without pushing content off screen.
       The 76vw tile width lets users see the edge of the next card. */
    .tiles-wrap {
      width: 100%;
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      scrollbar-width: none; /* Firefox */
      padding: 0.25rem max(1rem, env(safe-area-inset-left))
               0.5rem max(1rem, env(safe-area-inset-right));
    }
    .tiles-wrap::-webkit-scrollbar { display: none; }

    .tiles {
      display: flex;
      flex-direction: row;
      gap: 0.9rem;
      width: max-content; /* allow tiles to exceed viewport width */
    }

    .tile {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 76vw;
      max-width: 240px;
      min-height: 110px;
      padding: 1.4rem 1.2rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      text-decoration: none;
      scroll-snap-align: start;
      transition: border-color 0.18s ease, background 0.18s ease;
    }

    .tile:hover, .tile:focus-visible {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
      outline: none;
    }

    .tile-name {
      display: block;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
    }

    .tile-desc {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-top: 0.4rem;
      text-align: center;
    }

    .tile-inner { display: flex; flex-direction: column; align-items: center; }

    /* Scroll-hint fade on the right edge — shows users there's more to scroll */
    .tiles-wrap::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 2rem;
      background: linear-gradient(to right, transparent, #0a0a0a 90%);
      pointer-events: none;
    }
    /* Make wrap relative for the pseudo fade */
    .tiles-wrap { position: relative; }

    .aside {
      margin-top: 1.5rem;
      text-align: center;
    }
    .aside-link {
      display: inline-block;
      padding: 0.45rem 0.9rem;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      transition: color 0.18s ease, border-color 0.18s ease;
    }
    .aside-link:hover, .aside-link:focus-visible {
      color: var(--accent);
      border-color: rgba(212, 168, 67, 0.4);
      outline: none;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* 2-column grid on medium screens */
    @media (min-width: 480px) {
      .hub-title { font-size: 1.5rem; }
      .hub-subtitle { font-size: 0.85rem; margin-bottom: 2rem; }
    }

    /* On wide-enough screens, show all tiles in a row — no scrolling needed.
       Raise the breakpoint to accommodate 4 tiles comfortably. */
    @media (min-width: 860px) {
      body { padding: 2rem; }
      .hub { max-width: 1100px; }
      .hub-title { font-size: 1.65rem; margin-bottom: 0.5rem; }
      .hub-subtitle { margin-bottom: 2.25rem; }

      .tiles-wrap {
        overflow: visible;
        padding: 0;
        width: 100%;
      }
      /* Hide the scroll-fade on wide screens */
      .tiles-wrap::after { display: none; }

      .tiles {
        width: 100%;
        gap: 1.5rem;
      }

      .tile {
        flex: 1 1 0;
        width: auto;
        max-width: none;
        min-height: 140px;
        padding: 1.8rem 1.5rem;
      }

      .tile-name { font-size: 1.5rem; }
    }

    .acdc-slash { color: var(--text-dim); margin: 0 0.05em; }
  </style>
</head>
<body>
  <main class="hub">
    <h1 class="hub-title">PLATFORMVV</h1>
    <p class="hub-subtitle">Multiplayer games &middot; pick your table</p>

    <div class="tiles-wrap">
      <div class="tiles">
        <a class="tile" href="/platform/" data-game="platform">
          <div class="tile-inner">
            <span class="tile-name">Platform</span>
            <span class="tile-desc">2–6 players</span>
          </div>
        </a>

        <a class="tile" href="/auction/" data-game="auction">
          <div class="tile-inner">
            <span class="tile-name">Auction</span>
            <span class="tile-desc">2–6 players</span>
          </div>
        </a>

        <a class="tile" href="/acdc/" data-game="acdc">
          <div class="tile-inner">
            <span class="tile-name">AC<span class="acdc-slash">/</span>DC</span>
            <span class="tile-desc">2 players</span>
          </div>
        </a>

        <a class="tile" href="/doors/" data-game="doors">
          <div class="tile-inner">
            <span class="tile-name">Doors</span>
            <span class="tile-desc">5 players</span>
          </div>
        </a>
      </div>
    </div>

    <div class="aside">
      <a class="aside-link" href="/level0/" data-game="level0">Level 0</a>
    </div>

    <footer>platformvv.com</footer>
  </main>

  <script>
    document.querySelectorAll('.tile[data-game]').forEach((el) => {
      el.addEventListener('click', () => {
        if (typeof gtag === 'function') {
          gtag('event', 'hub_tile_click', { game: el.dataset.game });
        }
      });
    });
  </script>
</body>
</html>
